<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors — Pitch classes</title>
<link rel="stylesheet" href="_card.css">
<style>
  .paper-stage {
    background: white;
    border: 1px solid #c0c0c0;
    border-radius: 12px;
    padding: 26px 22px;
    box-shadow: 0 8px 28px rgba(20, 20, 35, 0.10);
  }
  .pcs {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 12px;
    align-items: end;
  }
  .pc { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .dot {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.12);
  }
  .pc-name { font: bold 13px/1 Arial, sans-serif; color: #222; }
  .pc-hex { font: 9px/1 'Courier New', monospace; color: #a0a0a8; }
</style>
</head>
<body>
  <p class="card-intro">Twelve carefully-distinct hues — one per semitone, from C to B. <b>Tuned to read on the white canvas</b>, not on the dark chrome.</p>

  <div class="paper-stage">
    <div class="pcs">
      <div class="pc"><div class="dot" style="background:#e74c3c;"></div><div class="pc-name">C</div><div class="pc-hex">e74c3c</div></div>
      <div class="pc"><div class="dot" style="background:#e67e22;"></div><div class="pc-name">C♯</div><div class="pc-hex">e67e22</div></div>
      <div class="pc"><div class="dot" style="background:#f1c40f;"></div><div class="pc-name">D</div><div class="pc-hex">f1c40f</div></div>
      <div class="pc"><div class="dot" style="background:#a8b820;"></div><div class="pc-name">E♭</div><div class="pc-hex">a8b820</div></div>
      <div class="pc"><div class="dot" style="background:#27ae60;"></div><div class="pc-name">E</div><div class="pc-hex">27ae60</div></div>
      <div class="pc"><div class="dot" style="background:#16a085;"></div><div class="pc-name">F</div><div class="pc-hex">16a085</div></div>
      <div class="pc"><div class="dot" style="background:#2980b9;"></div><div class="pc-name">F♯</div><div class="pc-hex">2980b9</div></div>
      <div class="pc"><div class="dot" style="background:#6c5ce7;"></div><div class="pc-name">G</div><div class="pc-hex">6c5ce7</div></div>
      <div class="pc"><div class="dot" style="background:#a855f7;"></div><div class="pc-name">A♭</div><div class="pc-hex">a855f7</div></div>
      <div class="pc"><div class="dot" style="background:#e91e8c;"></div><div class="pc-name">A</div><div class="pc-hex">e91e8c</div></div>
      <div class="pc"><div class="dot" style="background:#c0392b;"></div><div class="pc-name">B♭</div><div class="pc-hex">c0392b</div></div>
      <div class="pc"><div class="dot" style="background:#795548;"></div><div class="pc-name">B</div><div class="pc-hex">795548</div></div>
    </div>
  </div>
</body>
</html>
