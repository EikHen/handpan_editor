<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors — Status &amp; function</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .legend-grid {
    background: var(--surface-panel);
    border: 1px solid var(--border-card);
    border-radius: 6px;
    overflow: hidden;
  }
  .legend-cell {
    display: grid;
    grid-template-columns: 30px 1fr 80px;
    align-items: center; gap: 10px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border-card);
  }
  .legend-cell:last-child { border-bottom: 0; }
  .legend-cell .glyph {
    text-align: center;
    font: 16px/1 Arial, sans-serif;
  }
  .legend-cell .label { font: 12px/1 Arial, sans-serif; color: var(--fg-1); }
  .legend-cell .hex   { font: 10px/1 var(--font-mono); color: var(--fg-faint); text-align: right; }

  .play-full       { color: var(--play-full); }
  .play-partial    { color: var(--play-partial); }
  .play-incomplete { color: var(--play-incomplete); }
  .play-none       { color: var(--play-none); }

  .fn-T { color: var(--fn-tonic); }
  .fn-S { color: var(--fn-subdom); }
  .fn-D { color: var(--fn-dominant); }

  .tiles-stage {
    background: var(--surface-panel);
    border: 1px solid var(--border-card);
    border-radius: 6px;
    padding: 14px 16px;
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
  }
  .tile {
    background: var(--surface-card);
    border: 1px solid var(--border-input);
    border-radius: 5px;
    padding: 7px 10px 6px; min-width: 66px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .tile.t-tonic    { border-top: 2px solid var(--fn-tonic); }
  .tile.t-subdom   { border-top: 2px solid var(--fn-subdom); }
  .tile.t-dominant { border-top: 2px solid var(--fn-dominant); }
  .tile .roman { font: 9px/1.3 var(--font-mono); color: var(--fg-faint); }
  .tile .t-root { font: bold 14px/1.1 var(--font-sans); color: var(--fg-1); }
  .tile .t-sym { font: 9px/1.2 var(--font-sans); color: var(--accent); }
</style>
</head>
<body>
  <div class="grid">
    <div class="group">
      <div class="group-head"><div class="group-title">Playability</div><div class="group-meta">how a chord sits on the pan</div></div>
      <div class="legend-grid">
        <div class="legend-cell"><span class="glyph play-full">●</span><span class="label">Complete</span><span class="hex">#1a9966</span></div>
        <div class="legend-cell"><span class="glyph play-partial">◕</span><span class="label">−1 note</span><span class="hex">#c08a00</span></div>
        <div class="legend-cell"><span class="glyph play-incomplete">◔</span><span class="label">−2+ notes</span><span class="hex">#c63838</span></div>
        <div class="legend-cell"><span class="glyph play-none">○</span><span class="label">None</span><span class="hex">#b0a89b</span></div>
      </div>
    </div>

    <div class="group">
      <div class="group-head"><div class="group-title">Harmonic function</div><div class="group-meta">tile top-stripe colours</div></div>
      <div class="tiles-stage">
        <div class="tile t-tonic"><div class="roman">I</div><div class="t-root">D</div><div class="t-sym">△</div></div>
        <div class="tile t-subdom"><div class="roman">IV</div><div class="t-root">G</div><div class="t-sym">△</div></div>
        <div class="tile t-dominant"><div class="roman">V</div><div class="t-root">A</div><div class="t-sym">⁷</div></div>
        <div class="tile t-tonic"><div class="roman">vi</div><div class="t-root">B</div><div class="t-sym">−</div></div>
      </div>
      <div class="legend-grid" style="margin-top:10px;">
        <div class="legend-cell"><span class="glyph fn-T">■</span><span class="label">Tonic</span><span class="hex">#3d7395</span></div>
        <div class="legend-cell"><span class="glyph fn-S">■</span><span class="label">Subdominant</span><span class="hex">#3a7a4a</span></div>
        <div class="legend-cell"><span class="glyph fn-D">■</span><span class="label">Dominant</span><span class="hex">#b8763a</span></div>
      </div>
    </div>
  </div>
</body>
</html>
