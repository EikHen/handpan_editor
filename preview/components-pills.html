<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pills</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
  <p class="card-intro">Pills do all the filtering in the side panels — single-select for mood &amp; chord type.</p>

  <div class="group">
    <div class="group-head"><div class="group-title">Mood</div><div class="group-meta">single-select</div></div>
    <div class="stage">
      <button class="p-pill is-active">☀ Happy</button>
      <button class="p-pill">♩ Melancholic</button>
      <button class="p-pill">♪ Jazz</button>
      <button class="p-pill">⚡ Epic</button>
      <button class="p-pill">◆ Dark</button>
      <button class="p-pill">◌ Peaceful</button>
    </div>
  </div>

  <div class="group">
    <div class="group-head"><div class="group-title">Chord type</div><div class="group-meta">filter the chords panel</div></div>
    <div class="stage">
      <button class="p-pill is-active">All</button>
      <button class="p-pill">△ Major</button>
      <button class="p-pill">− Minor</button>
      <button class="p-pill">° Dim</button>
      <button class="p-pill">+ Aug</button>
      <button class="p-pill">sus²</button>
      <button class="p-pill">sus⁴</button>
      <button class="p-pill">△⁷ Maj7</button>
      <button class="p-pill">−⁷ Min7</button>
      <button class="p-pill">⁷ Dom7</button>
      <button class="p-pill">ø⁷ ½-dim</button>
    </div>
  </div>

  <div class="group">
    <div class="group-head"><div class="group-title">Rhythm category</div><div class="group-meta">scrolls horizontally when wider</div></div>
    <div class="stage">
      <button class="p-pill is-active">All</button>
      <button class="p-pill">Arabic/Turkish</button>
      <button class="p-pill">Persian</button>
      <button class="p-pill">Greek</button>
      <button class="p-pill">Flamenco</button>
      <button class="p-pill">Brazilian</button>
      <button class="p-pill">Forró</button>
      <button class="p-pill">Odd Metre</button>
    </div>
  </div>
</body>
</html>
