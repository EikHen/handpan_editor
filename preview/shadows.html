<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadows</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .item {
    background: var(--surface-card);
    border: 1px solid var(--border-card);
    border-radius: 10px;
    padding: 22px 18px 18px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    box-shadow: var(--shadow-light);
  }
  .stage {
    background: var(--surface-canvas-bg);
    border-radius: 8px;
    padding: 32px 24px;
    width: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .box {
    width: 96px; height: 76px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font: 600 11px/1 var(--font-sans);
  }
  .canvas { background: white; box-shadow: var(--shadow-canvas); color: var(--fg-1); }
  .popup  { background: var(--surface-card); border: 1px solid var(--border-card); box-shadow: var(--shadow-popup); color: var(--fg-1); }
  .modal  { background: var(--surface-card); border: 1px solid var(--border-card); box-shadow: var(--shadow-modal); color: var(--fg-1); }
  .name { font: 600 12px/1 var(--font-sans); color: var(--fg-1); }
  .meta { font: 10px/1.3 var(--font-mono); color: var(--fg-faint); text-align: center; }
</style>
</head>
<body>
  <p class="card-intro">Shadows are <b>reserved for the canvas and pop-ups</b>. Cards, buttons and pills stay flat.</p>
  <div class="grid">
    <div class="item">
      <div class="stage"><div class="box canvas">canvas</div></div>
      <div class="name">--shadow-canvas</div>
      <div class="meta">around the white pan</div>
    </div>
    <div class="item">
      <div class="stage"><div class="box popup">popup</div></div>
      <div class="name">--shadow-popup</div>
      <div class="meta">tooltips · legends</div>
    </div>
    <div class="item">
      <div class="stage"><div class="box modal">modal</div></div>
      <div class="name">--shadow-modal</div>
      <div class="meta">dialogs · shortcut panel</div>
    </div>
  </div>
</body>
</html>
